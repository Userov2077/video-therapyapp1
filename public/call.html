<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Видеозвонок | Therapy Call</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0f0a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
        .call-container { width: 100%; max-width: 1400px; }
        .call-layout { display: flex; gap: 20px; }
        .video-section { flex: 3; }
        .chat-section { width: 320px; background: rgba(30,35,32,0.4); backdrop-filter: blur(20px); border-radius: 24px; display: flex; flex-direction: column; height: 600px; border: 1px solid rgba(139,202,139,0.2); }
        .chat-header { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .chat-message { max-width: 85%; padding: 8px 12px; border-radius: 16px; font-size: 13px; word-wrap: break-word; }
        .chat-message.outgoing { align-self: flex-end; background: #8bca8b; color: #1a3c2c; border-bottom-right-radius: 4px; }
        .chat-message.incoming { align-self: flex-start; background: rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }
        .chat-message-time { font-size: 9px; opacity: 0.6; margin-top: 4px; }
        .chat-input { display: flex; gap: 10px; padding: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
        .chat-input input { flex: 1; padding: 10px 14px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; font-size: 14px; outline: none; }
        .chat-input button { background: #8bca8b; border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; color: #1a3c2c; }
        .video-container { display: flex; gap: 20px; margin-bottom: 20px; }
        .video-wrapper { flex: 1; position: relative; background: #000; border-radius: 24px; overflow: hidden; aspect-ratio: 4/3; border: 1px solid rgba(139,202,139,0.3); }
        video { width: 100%; height: 100%; object-fit: cover; }
        .video-label { position: absolute; bottom: 12px; left: 12px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .waiting-message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: white; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #8bca8b; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .controls { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .control-btn { width: 60px; height: 60px; border-radius: 50%; border: none; background: rgba(30,35,32,0.8); backdrop-filter: blur(10px); cursor: pointer; font-size: 24px; transition: all 0.3s; color: white; border: 1px solid rgba(139,202,139,0.3); }
        .control-btn:hover { transform: scale(1.1); background: rgba(139,202,139,0.3); }
        .end-call { background: rgba(220,38,38,0.8); }
        .end-call:hover { background: #dc2626; }
        .control-btn.muted { background: #f59e0b; }
        .recording-active { background: #dc2626 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .recording-indicator { position: fixed; top: 20px; right: 20px; background: #dc2626; color: white; padding: 6px 12px; border-radius: 30px; font-size: 12px; display: none; align-items: center; gap: 8px; z-index: 100; }
        .recording-indicator.show { display: flex; }
        .call-info { text-align: center; padding: 10px 20px; background: rgba(30,35,32,0.6); backdrop-filter: blur(10px); border-radius: 40px; display: inline-block; width: auto; margin: 0 auto; font-size: 14px; border: 1px solid rgba(139,202,139,0.2); }
        #connection-status { position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 8px 16px; border-radius: 30px; font-size: 12px; font-family: monospace; cursor: pointer; z-index: 1000; border: 1px solid rgba(139,202,139,0.3); }
        
        /* Мобильная адаптация */
        @media (max-width: 768px) {
            body { padding: 12px; }
            .call-layout { flex-direction: column; gap: 12px; }
            .chat-section { width: 100%; height: 280px; order: 2; }
            .video-section { order: 1; }
            .video-container { flex-direction: column; gap: 12px; }
            .video-wrapper { aspect-ratio: 16/9; }
            .controls { gap: 12px; }
            .control-btn { width: 50px; height: 50px; font-size: 20px; }
            .chat-messages { padding: 12px; }
            .chat-message { max-width: 90%; font-size: 12px; }
            .chat-input input { font-size: 13px; padding: 8px 12px; }
            .call-info { font-size: 11px; padding: 6px 12px; }
            #connection-status { font-size: 10px; bottom: 10px; right: 10px; }
            .recording-indicator { top: 10px; right: 10px; font-size: 10px; padding: 4px 10px; }
        }
        
        @media (max-width: 480px) {
            .control-btn { width: 44px; height: 44px; font-size: 18px; }
            .chat-section { height: 250px; }
            .chat-message { max-width: 95%; }
        }
    </style>
</head>
<body>
    <div class="call-container">
        <div class="recording-indicator" id="recordingIndicator">
            <i class="fas fa-circle" style="font-size: 10px;"></i> Запись...
        </div>
        <div class="call-layout">
            <div class="video-section">
                <div class="video-container">
                    <div class="video-wrapper">
                        <video id="localVideo" autoplay muted playsinline></video>
                        <div class="video-label">Вы</div>
                    </div>
                    <div class="video-wrapper">
                        <video id="remoteVideo" autoplay playsinline></video>
                        <div class="video-label">Собеседник</div>
                        <div id="waitingMessage" class="waiting-message">
                            <div class="spinner"></div>
                            <p>Ожидание подключения...</p>
                        </div>
                    </div>
                </div>
                <div class="controls">
                    <button id="toggleMic" class="control-btn" title="Микрофон"><i class="fas fa-microphone"></i></button>
                    <button id="toggleCam" class="control-btn" title="Камера"><i class="fas fa-video"></i></button>
                    <button id="recordBtn" class="control-btn" title="Запись звонка"><i class="fas fa-circle"></i></button>
                    <button id="endCall" class="control-btn end-call" title="Завершить"><i class="fas fa-phone-slash"></i></button>
                </div>
            </div>
            <div class="chat-section">
                <div class="chat-header"><span><i class="fas fa-comment"></i> Чат звонка</span></div>
                <div class="chat-messages" id="chatMessages"><div style="text-align:center; opacity:0.5; padding:20px;">Чат для сообщений во время звонка</div></div>
                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="Сообщение...">
                    <button id="sendChatBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
        <div style="text-align: center; margin-top: 16px;">
            <div class="call-info"><i class="fas fa-key"></i> Комната: <strong id="roomId"></strong></div>
        </div>
    </div>
    <div id="connection-status">📡 <span id="statusText">Подключение...</span></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = null;
        let localStream = null;
        let peerConnection = null;
        let currentRoomId = null;
        let userRole = null;
        let partnerId = null;
        let currentUserId = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        
        const urlParams = new URLSearchParams(window.location.search);
        currentRoomId = urlParams.get('room');
        userRole = urlParams.get('role');
        partnerId = urlParams.get('partner');
        currentUserId = localStorage.getItem('userId');
        
        document.getElementById('roomId').textContent = currentRoomId;
        
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const waitingMessage = document.getElementById('waitingMessage');
        const toggleMicBtn = document.getElementById('toggleMic');
        const toggleCamBtn = document.getElementById('toggleCam');
        const recordBtn = document.getElementById('recordBtn');
        const endCallBtn = document.getElementById('endCall');
        const statusText = document.getElementById('statusText');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendChatBtn = document.getElementById('sendChatBtn');
        const recordingIndicator = document.getElementById('recordingIndicator');
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.style.cssText = `position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:rgba(30,35,32,0.95); backdrop-filter:blur(20px); border:1px solid ${isError ? '#dc2626' : '#8bca8b'}; border-radius:16px; padding:10px 20px; color:${isError ? '#ff6b6b' : '#8bca8b'}; font-size:13px; z-index:3000; white-space:nowrap; max-width:90%; white-space:normal; text-align:center;`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function updateStatus(message, isError = false) {
            statusText.textContent = message;
            statusText.style.color = isError ? '#ff6b6b' : '#8bca8b';
            console.log(`📡 ${message}`);
        }
        
        function addChatMessage(text, isOutgoing = false, time = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${isOutgoing ? 'outgoing' : 'incoming'}`;
            const timeStr = time ? new Date(time).toLocaleTimeString() : new Date().toLocaleTimeString();
            messageDiv.innerHTML = `<div>${escapeHtml(text)}</div><div class="chat-message-time">${timeStr}</div>`;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        async function startCall() {
            try {
                updateStatus('Запрос камеры...');
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
                updateStatus('Камера готова');
                socket = io();
                socket.on('connect', () => {
                    updateStatus('Сервер подключен');
                    socket.emit('join-call-room', currentRoomId, currentUserId, userRole);
                });
                socket.on('room-joined', () => updateStatus('Ожидание собеседника...'));
                socket.on('call-ready', (data) => {
                    updateStatus('Собеседник найден, установка соединения...');
                    partnerId = data.partnerId;
                    initWebRTC();
                });
                socket.on('offer', async (data) => {
                    partnerId = data.from;
                    if (!peerConnection) await initWebRTC();
                    await handleOffer(data);
                });
                socket.on('answer', async (data) => await handleAnswer(data));
                socket.on('ice-candidate', async (data) => {
                    if (peerConnection) await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                });
                socket.on('call-message', (data) => addChatMessage(data.text, false, data.time));
                socket.on('recording-started', () => {
                    recordingIndicator.classList.add('show');
                    updateStatus('🔴 Идет запись звонка');
                });
                socket.on('recording-stopped', () => {
                    recordingIndicator.classList.remove('show');
                    updateStatus('✅ Запись завершена');
                });
                socket.on('call-ended', () => {
                    updateStatus('Звонок завершен');
                    if (isRecording) stopRecording();
                    setTimeout(() => window.location.href = '/', 1500);
                });
                socket.on('partner-disconnected', () => {
                    updateStatus('Собеседник отключился', true);
                    alert('Собеседник отключился');
                    window.location.href = '/';
                });
                sendChatBtn.onclick = () => {
                    const text = chatInput.value.trim();
                    if (!text) return;
                    addChatMessage(text, true);
                    socket.emit('call-message', { from: currentUserId, to: partnerId, text: text });
                    chatInput.value = '';
                };
                chatInput.onkeypress = (e) => { if (e.key === 'Enter') sendChatBtn.click(); };
            } catch (error) {
                updateStatus('Нет доступа к камере', true);
                alert('Не удалось получить доступ к камере');
            }
        }
        
        async function initWebRTC() {
            if (peerConnection) return;
            updateStatus('Настройка соединения...');
            const config = {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                    { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
                    { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
                ]
            };
            peerConnection = new RTCPeerConnection(config);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            peerConnection.ontrack = (event) => {
                updateStatus('✅ Видео получено!');
                remoteVideo.srcObject = event.streams[0];
                waitingMessage.style.display = 'none';
            };
            peerConnection.onicecandidate = (event) => {
                if (event.candidate && partnerId) socket.emit('ice-candidate', { target: partnerId, candidate: event.candidate });
            };
            peerConnection.oniceconnectionstatechange = () => {
                const state = peerConnection.iceConnectionState;
                if (state === 'connected') updateStatus('✅ Соединение установлено!');
                if (state === 'failed') updateStatus('❌ Соединение не удалось', true);
            };
            if (userRole === 'psychologist') await createOffer();
        }
        
        async function createOffer() {
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('offer', { target: partnerId, sdp: offer });
        }
        
        async function handleOffer(data) {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('answer', { target: partnerId, sdp: answer });
        }
        
        async function handleAnswer(data) {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp));
        }

        async function startRecording() {
            if (!localStream) return;
            try {
                updateStatus('🎥 Начинаем запись...');
                recordedChunks = [];
                const audioContext = new AudioContext();
                const dest = audioContext.createMediaStreamDestination();
                const micTrack = localStream.getAudioTracks()[0];
                const micStream = new MediaStream([micTrack]);
                const micSource = audioContext.createMediaStreamSource(micStream);
                micSource.connect(dest);
                const recordingStream = new MediaStream([...dest.stream.getAudioTracks()]);
                mediaRecorder = new MediaRecorder(recordingStream, { mimeType: 'audio/webm' });
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) recordedChunks.push(event.data);
                };
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(recordedChunks, { type: 'audio/webm' });
                    const formData = new FormData();
                    formData.append('recording', blob, `recording-${Date.now()}.webm`);
                    formData.append('from', currentUserId);
                    formData.append('to', partnerId);
                    formData.append('roomId', currentRoomId);
                    const res = await fetch('/api/upload-recording', { method: 'POST', body: formData });
                    const data = await res.json();
                    if (data.success) {
                        updateStatus('✅ Запись сохранена!');
                        showToast('Запись звонка сохранена');
                    } else {
                        updateStatus('❌ Ошибка сохранения записи', true);
                    }
                    audioContext.close();
                };
                mediaRecorder.start(1000);
                isRecording = true;
                recordBtn.classList.add('recording-active');
                recordingIndicator.classList.add('show');
                updateStatus('🔴 Идет запись звонка...');
            } catch (err) {
                updateStatus('❌ Ошибка записи: ' + err.message, true);
                console.error(err);
            }
        }
        
        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                isRecording = false;
                recordBtn.classList.remove('recording-active');
                recordingIndicator.classList.remove('show');
                updateStatus('✅ Запись завершена');
            }
        }
        
        recordBtn.onclick = async () => {
            if (isRecording) {
                stopRecording();
                recordBtn.classList.remove('recording-active');
            } else {
                await startRecording();
                recordBtn.classList.add('recording-active');
            }
        };
        
        toggleMicBtn.onclick = () => {
            if (localStream) {
                const track = localStream.getAudioTracks()[0];
                track.enabled = !track.enabled;
                toggleMicBtn.classList.toggle('muted');
            }
        };
        
        toggleCamBtn.onclick = () => {
            if (localStream) {
                const track = localStream.getVideoTracks()[0];
                track.enabled = !track.enabled;
                toggleCamBtn.classList.toggle('muted');
            }
        };
        
        endCallBtn.onclick = () => {
            if (socket) socket.emit('end-call');
            if (isRecording) stopRecording();
            window.location.href = '/';
        };
        
        startCall();
    </script>
</body>
</html>
